name: lumina_reader
description: Premium E-Book, Manga, Novel & Anime Reader with Extension System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.3

  # HTTP & Networking
  http: ^1.2.0
  http_interceptor: ^2.0.0
  connectivity_plus: ^7.2.0

  # Reader - Manga
  extended_image: ^8.2.0
  photo_view: ^0.15.0
  scrollable_positioned_list: ^0.3.8

  # Reader - Novels
  flutter_html: ^3.0.0-beta.2
  flutter_tts: ^4.0.2

  # Reader - EPUB (NEW)
  epubx: ^4.0.0
  archive: ^3.6.1

  # Reader - PDF (NEW)
  pdfrx: ^2.4.7

  # Anime Player (from Mangayomi — media_kit / libmpv)
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # Picture-in-Picture (NEW — from Aniyomi)
  floating: ^3.0.0

  # UI & Theming
  flex_color_scheme: ^7.3.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  bot_toast: ^4.1.3
  draggable_menu: ^4.4.1
  marquee: ^2.2.3

  # Calendar (NEW — anime airing schedule)
  table_calendar: ^3.1.1

  # Utils
  intl: ^0.19.0
  share_plus: ^10.1.0
  url_launcher: ^6.3.0
  file_picker: ^10.0.0
  permission_handler: ^12.0.3
  package_info_plus: ^10.2.0
  device_info_plus: ^13.2.0
  screen_brightness: ^1.0.1
  wakelock_plus: ^1.2.8
  uuid: ^4.4.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  html: ^0.15.4
  xpath_selector_html_parser: ^3.0.1
  super_sliver_list: ^0.4.1
  grouped_list: ^5.1.2
  numberpicker: ^2.1.2
  path: ^1.9.0
  convert: ^3.1.1
  json_view: ^0.4.2
  pseudom: ^1.0.1
  js_packer: ^0.0.6

  # WebView (Cloudflare bypass)
  flutter_inappwebview: ^6.0.0

  # Extension interpreters (NEW — runtime for source extensions)
  # d4rt: pure-Dart interpreter for Dart-language extensions
  d4rt: ^0.2.2
  # flutter_qjs: QuickJS bindings for JavaScript-language extensions
  # Uses Mangayomi's fork (not on pub.dev)
  flutter_qjs:
    git:
      url: https://github.com/kodjodevf/flutter_qjs.git
      ref: main

  # Background service (NEW - fixes HyperOS killing downloads)
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.1.2

  # Localization & Deep links
  app_links: ^6.1.1

  # Local auth (app lock)
  local_auth: ^2.2.0

  # Hive (lightweight KV)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Freezed annotations
  freezed_annotation: ^2.4.1

  # Flutter Rust Bridge (image crop, EPUB parse)
  flutter_rust_bridge: ^2.0.0

  # OAuth for trackers
  flutter_web_auth_2: ^4.0.0

  # Cloud sync (Firebase Firestore)
  cloud_firestore: ^5.4.0

  # External player intents (VLC, MX Player, etc.)
  android_intent_plus: ^5.2.0

  # Image cache manager (for extended_image integration)
  flutter_cache_manager: ^3.4.1

  # JSON annotations (for models with @JsonSerializable)
  json_annotation: ^4.9.0

  # Meta (for @immutable, @protected, etc.)
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0
  freezed: ^2.5.2
  flutter_launcher_icons: ^0.13.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
