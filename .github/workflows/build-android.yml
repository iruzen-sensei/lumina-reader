name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (Isar, Riverpod, Freezed, JSON)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -alias lumina -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore android/signing-keystore.jks \
            -storepass lumina2026 -keypass lumina2026 \
            -dname "CN=Lumina,O=Lumina,C=US"

      - name: Build APK (signed by Gradle)
        run: flutter build apk --release
        env:
          KEY_ALIAS: lumina
          KEY_PASSWORD: lumina2026
          KEYSTORE_PASSWORD: lumina2026

      - name: Verify signature
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          "$APKSIGNER" verify --verbose build/app/outputs/flutter-apk/app-release.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: lumina-reader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
